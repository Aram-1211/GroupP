<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Tracker</title>
    <script>
    (function () {
        try {
            const storedTheme = localStorage.getItem('nutrition-tracker-theme') || 'auto';
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            const theme =
                storedTheme === 'dark' ||
                (storedTheme === 'auto' && prefersDark)
                    ? 'dark'
                    : 'light';

            document.documentElement.dataset.theme = theme;
            document.documentElement.dataset.themeSetting = storedTheme;
            document.documentElement.style.colorScheme = theme;
        } catch (error) {
            document.documentElement.dataset.theme = 'light';
            document.documentElement.dataset.themeSetting = 'auto';
            document.documentElement.style.colorScheme = 'light';
        }
    })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="app-shell">
        <div class="container app-container py-4">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 id="header-date">Your Day - Today</h4>

                <div class="d-flex gap-2">
    <div class="btn-group">
        <button class="btn btn-sm btn-primary" id="btn-daily">Daily</button>
        <button class="btn btn-sm btn-outline-primary" id="btn-weekly">Weekly</button>
    </div>

    <div class="btn-group theme-toggle" role="group" aria-label="Theme mode">
        <button
            class="btn btn-sm btn-outline-secondary theme-toggle-btn"
            id="btn-light-theme"
            data-theme-setting="light"
            title="Light Theme"
        >
            ☀️
        </button>

        <button
            class="btn btn-sm btn-outline-secondary theme-toggle-btn"
            id="btn-dark-theme"
            data-theme-setting="dark"
            title="Dark Theme"
        >
            🌙
        </button>

        <button
            class="btn btn-sm btn-outline-secondary theme-toggle-btn"
            id="btn-auto-theme"
            data-theme-setting="auto"
            title="Auto Theme"
        >
            AUTO
        </button>
    </div>
</div>
            </div>

            <div class="macro-card">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h5>Macro Summary</h5>

                    <button class="btn btn-sm btn-outline-secondary" id="btn-edit-target">
                        Edit Target
                    </button>
                </div>

                <div id="macro-summary"></div>
            </div>

            <div class="nutrition-analysis-panel">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h6 class="mb-0">Nutrition Analysis</h6>
                </div>
                <p class="mb-0 text-muted">Placeholder content: brief nutrition feedback will appear here for the selected daily or weekly view.</p>
            </div>

            <div id="daily-view">

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5>Meals</h5>

                    <button class="btn btn-sm btn-primary" id="btn-add-meal">
                        Add Meal
                    </button>
                </div>

                <div id="meals-list"></div>

            </div>

            <div id="weekly-view" style="display: none;">

                <h5>Weekly Macro Trends</h5>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="btn-group">
                        <button class="btn btn-sm btn-primary" id="btn-calories">Calories</button>
                        <button class="btn btn-sm btn-outline-primary" id="btn-macronutrients">Macronutrients</button>
                    </div>
                    <div class="btn-group" role="group" aria-label="Week navigation">
                        <button class="btn btn-sm btn-outline-primary" id="btn-prev-week">Previous Week</button>
                        <button class="btn btn-sm btn-outline-primary" id="btn-next-week">Next Week</button>
                    </div>
                </div>

                <div style="position: relative;">
                    <canvas id="week-chart" height="250"></canvas>

                    <div id="week-day-buttons" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; padding: 6px 2px 0px 12px; margin-top: -8px; margin-left: 24px;"></div>
                </div>

                <div class="mt-4">

                    <h6 id="selected-day-title">
                        Selected Day: Today
                    </h6>

                    <div id="selected-day-meals"></div>

                </div>
            </div>

        </div>
    </div>

    <div class="bottom-nav">

        <button
            class="nav-btn"
            id="nav-add"
            onclick="new bootstrap.Modal(document.getElementById('addMealModal')).show()"
        >
            <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>

            <small>Add Meal</small>
        </button>

    </div>

    <!-- Add Meal Modal -->
    <div class="modal fade" id="addMealModal" tabindex="-1">

        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Add New Meal</h5>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                    ></button>
                </div>

                <div class="modal-body">

                    <div class="d-flex justify-content-end mb-3">
                        <button type="button" class="btn btn-sm btn-outline-secondary" id="btn-create-custom-meal">
                            Create Custom Meal
                        </button>
                    </div>

                    <div id="standard-meal-fields">
                        <form id="add-meal-form">

                            <div class="mb-3">
                                <label class="form-label">Date</label>

                                <input
                                    type="date"
                                    class="form-control"
                                    id="meal-date"
                                    required
                                >
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Search Food</label>

                                <input
                                    type="text"
                                    class="form-control"
                                    id="meal-food-search"
                                    placeholder="Type to filter foods"
                                >
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Food</label>

                                <select
                                    class="form-select"
                                    id="meal-food"
                                    required
                                ></select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">
                                    Quantity (grams)
                                </label>

                                <input
                                    type="number"
                                    class="form-control"
                                    id="meal-quantity"
                                    min="1"
                                    required
                                >
                            </div>

                            <button
                                type="submit"
                                class="btn btn-primary w-100"
                            >
                                Add Meal
                            </button>

                        </form>
                    </div>

                    <div id="custom-meal-fields" style="display: none;">
                        <form id="custom-meal-form">

                            <div class="mb-3">
                                <label class="form-label">Custom Meal Name</label>

                                <input
                                    type="text"
                                    class="form-control"
                                    id="custom-meal-name"
                                    placeholder="e.g. Homemade Pasta Salad"
                                    required
                                >
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Protein per 100g</label>

                                <input
                                    type="number"
                                    step="0.1"
                                    class="form-control"
                                    id="custom-meal-protein"
                                    placeholder="grams"
                                    required
                                >
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Fat per 100g</label>

                                <input
                                    type="number"
                                    step="0.1"
                                    class="form-control"
                                    id="custom-meal-fat"
                                    placeholder="grams"
                                    required
                                >
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Carbs per 100g</label>

                                <input
                                    type="number"
                                    step="0.1"
                                    class="form-control"
                                    id="custom-meal-carbs"
                                    placeholder="grams"
                                    required
                                >
                            </div>

                            <div class="d-flex gap-2">
                                <button
                                    type="button"
                                    class="btn btn-outline-secondary flex-grow-1"
                                    id="btn-back-standard-meal"
                                >
                                    Back
                                </button>

                                <button
                                    type="submit"
                                    class="btn btn-primary flex-grow-1"
                                >
                                    Save Custom Meal
                                </button>
                            </div>

                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Edit Target Modal -->
    <div class="modal fade" id="editTargetModal" tabindex="-1">

        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Edit Nutrition Target</h5>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                    ></button>
                </div>

                <div class="modal-body">

                    <form id="edit-target-form">

                        <div class="mb-3">
                            <label class="form-label">
                                Calories Target
                            </label>

                            <input
                                type="number"
                                class="form-control"
                                id="target-calories"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Protein Target (g)
                            </label>

                            <input
                                type="number"
                                step="0.1"
                                class="form-control"
                                id="target-protein"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Fat Target (g)
                            </label>

                            <input
                                type="number"
                                step="0.1"
                                class="form-control"
                                id="target-fat"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Carbs Target (g)
                            </label>

                            <input
                                type="number"
                                step="0.1"
                                class="form-control"
                                id="target-carbs"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Weight (kg)</label>

                            <input
                                type="number"
                                step="0.1"
                                class="form-control"
                                id="target-weight"
                                placeholder="e.g. 70"
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nutrition Goal</label>

                            <div class="d-flex gap-2 flex-wrap">
                                <button type="button" class="btn btn-outline-secondary" id="goal-cut">Cut / Lose Weight</button>
                                <button type="button" class="btn btn-outline-secondary" id="goal-maintain">Maintain Weight</button>
                                <button type="button" class="btn btn-outline-secondary" id="goal-bulk">Bulk / Gain Weight</button>
                            </div>
                        </div>

                        <div class="mb-3">
                            <div id="target-goal-guidance" class="border rounded p-3 bg-light text-muted" style="min-height: 80px;"></div>
                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100"
                        >
                            Save Target
                        </button>

                    </form>

                </div>
            </div>
        </div>
    </div>

    <!-- Recipes Modal -->
    <div class="modal fade" id="recipesModal" tabindex="-1">

        <div class="modal-dialog modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Recipes</h5>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                    ></button>
                </div>

                <div class="modal-body" id="recipes-list"></div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>

</body>
</html>
